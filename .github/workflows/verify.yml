name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - "fixer/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run product verification gate
        run: npm run verify
